<!DOCTYPE html>
<html lang="es">
<head>
	<title>TerraBuild - Aventura Medieval</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link rel="stylesheet" type="text/css" href="main.css">
	<style>
		body {
			background-color: #bfd1e5;
			color: #61443e;
		}
		a {
			color: #a06851;
		}
	</style>
</head>
<body>

<!-- Intro Container con Video y Música -->
<div id="intro-container" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:black; display:none;">
    <video id="intro-video" width="100%" height="100%" style="object-fit: cover;" muted>
        <source src="assets/videos/engel_intro.mp4" type="video/mp4">
    </video>
    <audio id="intro-music" loop>
        <source src="assets/music/intro_theme.mp3" type="audio/mpeg">
    </audio>
    <button id="skip-btn" style="position:absolute; bottom:20px; right:20px; background:rgba(139, 69, 19, 0.8); color:#d4af37; border:2px solid #d4af37; padding:15px 25px; cursor:pointer; font-family: 'Times New Roman', serif; font-size:16px; border-radius:5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Saltar Intro</button>
    <div id="music-controls" style="position:absolute; bottom:20px; left:20px; background:rgba(139, 69, 19, 0.8); padding:10px; border-radius:5px; border:1px solid #d4af37;">
        <button id="mute-btn" style="background:none; border:none; color:#d4af37; cursor:pointer; font-size:20px;">🔊</button>
        <input type="range" id="volume-slider" min="0" max="100" value="50" style="width:100px; vertical-align:middle;">
    </div>
    <!-- Botón de inicio forzado -->
    <button id="force-start" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:rgba(139, 69, 19, 0.3); color:#d4af37; border:2px solid rgba(212, 175, 55, 0.6); padding:20px 40px; cursor:pointer; font-family: 'Times New Roman', serif; font-size:18px; border-radius:10px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); backdrop-filter: blur(3px); display:none;">🎵 Iniciar con Música</button>
    
    <!-- Indicador de carga -->
    <div id="loading-indicator" style="position:absolute; top:20px; left:50%; transform:translateX(-50%); background:rgba(139, 69, 19, 0.9); color:#d4af37; padding:10px 20px; border-radius:5px; border:1px solid #d4af37; font-family: 'Times New Roman', serif; font-size:14px; display:none;">
        🎵 Cargando música de intro...
    </div>
</div>

<!-- Audio del Menú Principal -->
<audio id="menu-music" loop>
    <source src="assets/music/menu_theme.mp3" type="audio/mpeg">
</audio>

<div id="container"></div>
	
	<!-- Video de fondo pantalla completa -->
	<video id="backgroundVideo" autoplay muted loop>
		<source src="img/menu principal.mp4" type="video/mp4">
	</video>
	
	<!-- Menú Principal Medieval -->
	<div id="mainMenu" class="medieval-menu">
		<h2>TerraBuild</h2>
		<div class="subtitle">Aventura Medieval</div>
		<button class="menu-item" onclick="startOriginalGame()">Jugar Original</button>
		<button class="menu-item" onclick="startGame()">Mundo Medieval</button>
		<button class="menu-item" onclick="showOptions()">Opciones</button>
		<button class="menu-item" onclick="showControls()">Controles</button>
	</div>

	<!-- Pantalla de Juego -->
	<div id="gameScreen" style="display: none;">
		<div id="info">TerraBuild - Juego Medieval tipo Minecraft<br />(clic izquierdo: avanzar, clic derecho: retroceder)</div>
		<div id="container"></div>
		<div class="medieval-hud">
			<div class="hud-item">
				<span class="hud-icon"></span>
				<span>Vida: 100</span>
			</div>
			<div class="hud-item">
				<span class="hud-icon"></span>
				<span>Energía: 100</span>
			</div>
			<div class="hud-item">
				<span class="hud-icon"></span>
				<span>Bloques: 64</span>
			</div>
		</div>
		<button class="menu-item" onclick="backToMenu()" style="position: absolute; top: 20px; right: 20px; min-width: 100px; padding: 10px 20px;">Menú</button>
	</div>

		<script type="importmap">
			{
				"imports": {
					"three": "https://unpkg.com/three@0.160.0/build/three.module.js",
					"three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
					"./medieval-world.js": "./medieval-world.js"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import Stats from 'three/addons/libs/stats.module.js';

			import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
			import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';
			import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

			let container, stats;

			let camera, controls, scene, renderer;

			const worldWidth = 128, worldDepth = 128;
			const worldHalfWidth = worldWidth / 2;
			const worldHalfDepth = worldDepth / 2;
			const data = generateHeight( worldWidth, worldDepth );

			const clock = new THREE.Clock();

			// Variables del juego
			let gameStarted = false;
			let animationId;

			// Sistema de Entidades 3D
			const loader = new GLTFLoader();
			let entidadesCargadas = [];

			// Clase Player para equipamiento
			class Player {
				constructor() {
					this.equipo = {
						manoDerecha: null,
						armadura: "Placas de Hierro"
					};
				}

				equiparObjeto(objeto) {
					this.equipo.manoDerecha = objeto;
					console.log("Has equipado: " + objeto.nombre);
				}
			}

			// Crear instancia del jugador
			window.player = new Player();

			// Función para cargar cualquier entidad (Caballero, Aldeano, Espada)
			window.cargarEntidad = function(path, position) {
				loader.load(path, (gltf) => {
					const modelo = gltf.scene;
					modelo.position.set(position.x, position.y, position.z);
					
					// Ajuste de escala para que coincida con tus bloques de 1x1x1
					modelo.scale.set(0.5, 0.5, 0.5); 
					
					scene.add(modelo);
					entidadesCargadas.push(modelo);
					console.log("Entidad cargada con éxito:", path);
				}, undefined, (error) => {
					console.error("Error al cargar:", error);
				});
			};

			// Función para crear entidades medievales en el mundo
			window.crearEntidadesMedievales = function() {
				// Caballeros guardianes del castillo
				cargarEntidad('assets/models/caballero.glb', {x: 10, y: 2, z: 10});
				cargarEntidad('assets/models/caballero.glb', {x: -10, y: 2, z: 10});
				cargarEntidad('assets/models/caballero.glb', {x: 10, y: 2, z: -10});
				cargarEntidad('assets/models/caballero.glb', {x: -10, y: 2, z: -10});
				
				// Aldeanos en el pueblo
				cargarEntidad('assets/models/aldeano.glb', {x: 5, y: 1, z: 5});
				cargarEntidad('assets/models/aldeano.glb', {x: -5, y: 1, z: 5});
				cargarEntidad('assets/models/aldeano.glb', {x: 5, y: 1, z: -5});
				cargarEntidad('assets/models/aldeano.glb', {x: -5, y: 1, z: -5});
				
				// Objetos en el mundo (espadas, escudos, etc.)
				cargarEntidad('assets/models/espada_medieval.glb', {x: 0, y: 1, z: 0});
				cargarEntidad('assets/models/espada_medieval.glb', {x: 2, y: 1, z: 2});
				cargarEntidad('assets/models/espada_medieval.glb', {x: -2, y: 1, z: -2});
			};

			// Sistema de Intro con Música
			const introContainer = document.getElementById('intro-container');
			const introVideo = document.getElementById('intro-video');
			const introMusic = document.getElementById('intro-music');
			const menuMusic = document.getElementById('menu-music');
			const skipBtn = document.getElementById('skip-btn');
			const muteBtn = document.getElementById('mute-btn');
			const volumeSlider = document.getElementById('volume-slider');
			const forceStartBtn = document.getElementById('force-start');
			const loadingIndicator = document.getElementById('loading-indicator');

			// Función para iniciar el juego después de la intro
			window.iniciarJuego = function() {
				introContainer.style.display = 'none';
				introVideo.pause();
				// NO pausar música - mantener continuidad
				// introMusic.pause(); // Comentado para continuidad
				startMenuMusic();
			};

			// Función para iniciar música del menú
			window.startMenuMusic = function() {
				// Si la música de intro está reproduciéndose, continuar con la misma
				if (!introMusic.paused) {
					console.log('🎵 Continuando música de intro en el menú');
					// Bajar volumen para el menú pero mantener la misma canción
					introMusic.volume = 0.3;
					// No iniciar nueva música, solo ajustar volumen
					return;
				}
				
				// Solo iniciar música del menú si la intro no está activa
				menuMusic.volume = 0.3;
				menuMusic.play().catch(e => console.log('Música del menú bloqueada'));
			};

			// Función para forzar inicio con música
			window.forceStartWithMusic = function() {
				loadingIndicator.style.display = 'block'; // Mostrar indicador de carga
				introMusic.volume = 0.5;
				introMusic.play().then(() => {
					console.log('🎵 Música de intro iniciada manualmente');
					forceStartBtn.style.display = 'none'; // Ocultar botón después de iniciar
					loadingIndicator.style.display = 'none'; // Ocultar indicador
				}).catch(e => {
					console.log('❌ Error al iniciar música:', e);
					loadingIndicator.style.display = 'none'; // Ocultar indicador incluso si hay error
					alert('No se pudo reproducir la música. Asegúrate de tener archivos de audio en la carpeta assets/music/');
				});
				introVideo.play().catch(e => console.log('Video no disponible'));
			};

			// Configurar controles de música
			muteBtn.addEventListener('click', function() {
				// Controlar tanto intro como menu music
				if (introMusic.muted && menuMusic.muted) {
					introMusic.muted = false;
					menuMusic.muted = false;
					muteBtn.textContent = '🔊';
				} else {
					introMusic.muted = true;
					menuMusic.muted = true;
					muteBtn.textContent = '🔇';
				}
			});

			volumeSlider.addEventListener('input', function() {
				const volume = this.value / 100;
				// Aplicar volumen a ambas músicas para continuidad
				introMusic.volume = volume;
				menuMusic.volume = volume * 0.6; // Menú más bajo
			});

			// Eventos de la intro
			introVideo.onended = iniciarJuego;
			skipBtn.onclick = iniciarJuego;
			forceStartBtn.onclick = forceStartWithMusic;

			// Iniciar intro al cargar la página
			window.addEventListener('load', function() {
				introContainer.style.display = 'block';
				loadingIndicator.style.display = 'block'; // Mostrar indicador al inicio
				introMusic.volume = 0.5;
				
				// Intentar autoplay primero
				introMusic.play().then(() => {
					console.log('🎵 Música de intro iniciada automáticamente');
					forceStartBtn.style.display = 'none'; // Ocultar si autoplay funciona
					loadingIndicator.style.display = 'none'; // Ocultar indicador si funciona
				}).catch(e => {
					console.log('⚠️ Autoplay bloqueado - Mostrando botón de inicio manual');
					loadingIndicator.style.display = 'none'; // Ocultar indicador si hay error
					// Mostrar botón de inicio forzado
					forceStartBtn.style.display = 'block';
				});
				
				// Reproducir video de intro con música sincronizada
				introVideo.play().then(() => {
					console.log('🎬 Video de intro iniciado');
					// Asegurar que la música esté sincronizada con el video
					if (introMusic.paused) {
						introMusic.play().catch(e => console.log('Música bloqueada'));
					}
				}).catch(e => {
					console.log('Video no disponible, continuando con música');
					// Si el video falla, seguir con música
					setTimeout(() => {
						if (!introMusic.paused) {
							console.log('🎵 Música de intro reproduciéndose sin video');
						}
					}, 1000);
				});
			});

			// Hacer funciones globales para onclick
			window.startOriginalGame = function() {
				document.getElementById('backgroundVideo').style.display = 'none';
				document.getElementById('mainMenu').style.display = 'none';
				document.getElementById('gameScreen').style.display = 'block';
				
				// NO pausar música del menú - mantener continuidad
				// menuMusic.pause(); // Comentado para continuidad
				
				// Limpiar contenedor
				const container = document.getElementById('container');
				container.innerHTML = '';
				
				if (!gameStarted) {
					init();
					gameStarted = true;
				} else {
					// Reiniciar renderer si ya existe
					if (renderer) {
						container.appendChild(renderer.domElement);
					}
				}
				
				animate();
			};

			window.startGame = function() {
				document.getElementById('backgroundVideo').style.display = 'none';
				document.getElementById('mainMenu').style.display = 'none';
				document.getElementById('gameScreen').style.display = 'block';
				
				// NO pausar música del menú - mantener continuidad
				// menuMusic.pause(); // Comentado para continuidad
				
				if (!gameStarted) {
					// Cargar mundo medieval mejorado
					loadMedievalWorld();
					gameStarted = true;
				} else {
					// Si ya hay un juego iniciado, solo mostrar el medieval
					loadMedievalWorld();
				}
			};

			window.showOptions = function() {
				alert('Opciones del juego - Próximamente');
			};

			window.showControls = function() {
				alert('🎮 CONTROLES TERRABUILD\n\n🏹 MUNDO ORIGINAL:\n• Clic izquierdo: Avanzar\n• Clic derecho: Retroceder\n• Movimiento libre con mouse\n\n🏰 MUNDO MEDIEVAL:\n• Cámara automática rotativa\n• Observa el castillo y estructuras\n\n🏠 VUELTA AL MENÚ:\n• Botón "Menú" en esquina superior derecha');
			};

			window.backToMenu = function() {
				document.getElementById('gameScreen').style.display = 'none';
				document.getElementById('mainMenu').style.display = 'block';
				document.getElementById('backgroundVideo').style.display = 'block';
				
				// NO reanudar música del menú - mantener continuidad
				// startMenuMusic(); // Comentado para continuidad
				
				if (animationId) {
					cancelAnimationFrame(animationId);
				}
			};

			window.loadMedievalWorld = function() {
				// Limpiar contenedor
				const container = document.getElementById('container');
				container.innerHTML = '';
				
				// Cargar script del mundo medieval dinámicamente
				const script = document.createElement('script');
				script.type = 'module';
				script.src = './medieval-world.js';
				script.onload = () => {
					console.log('Mundo medieval cargado');
					// Cargar entidades 3D después de cargar el mundo
					setTimeout(() => {
						crearEntidadesMedievales();
					}, 1000);
				};
				script.onerror = () => {
					console.error('Error al cargar mundo medieval');
					// Cargar mundo original como fallback
					init();
				};
				document.head.appendChild(script);
			};

			function init() {

				container = document.getElementById( 'container' );

				camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 1, 20000 );
				camera.position.y = getY( worldHalfWidth, worldHalfDepth ) * 100 + 100;

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0xbfd1e5 );

				// sides

				const matrix = new THREE.Matrix4();

				const pxGeometry = new THREE.PlaneGeometry( 100, 100 );
				pxGeometry.attributes.uv.array[ 1 ] = 0.5;
				pxGeometry.attributes.uv.array[ 3 ] = 0.5;
				pxGeometry.rotateY( Math.PI / 2 );
				pxGeometry.translate( 50, 0, 0 );

				const nxGeometry = new THREE.PlaneGeometry( 100, 100 );
				nxGeometry.attributes.uv.array[ 1 ] = 0.5;
				nxGeometry.attributes.uv.array[ 3 ] = 0.5;
				nxGeometry.rotateY( - Math.PI / 2 );
				nxGeometry.translate( - 50, 0, 0 );

				const pyGeometry = new THREE.PlaneGeometry( 100, 100 );
				pyGeometry.attributes.uv.array[ 5 ] = 0.5;
				pyGeometry.attributes.uv.array[ 7 ] = 0.5;
				pyGeometry.rotateX( - Math.PI / 2 );
				pyGeometry.translate( 0, 50, 0 );

				const pzGeometry = new THREE.PlaneGeometry( 100, 100 );
				pzGeometry.attributes.uv.array[ 1 ] = 0.5;
				pzGeometry.attributes.uv.array[ 3 ] = 0.5;
				pzGeometry.translate( 0, 0, 50 );

				const nzGeometry = new THREE.PlaneGeometry( 100, 100 );
				nzGeometry.attributes.uv.array[ 1 ] = 0.5;
				nzGeometry.attributes.uv.array[ 3 ] = 0.5;
				nzGeometry.rotateY( Math.PI );
				nzGeometry.translate( 0, 0, - 50 );

				//

				const geometries = [];

				for ( let z = 0; z < worldDepth; z ++ ) {

					for ( let x = 0; x < worldWidth; x ++ ) {

						const h = getY( x, z );

						matrix.makeTranslation(
							x * 100 - worldHalfWidth * 100,
							h * 100,
							z * 100 - worldHalfDepth * 100
						);

						const px = getY( x + 1, z );
						const nx = getY( x - 1, z );
						const pz = getY( x, z + 1 );
						const nz = getY( x, z - 1 );

						geometries.push( pyGeometry.clone().applyMatrix4( matrix ) );

						if ( ( px !== h && px !== h + 1 ) || x === 0 ) {

							geometries.push( pxGeometry.clone().applyMatrix4( matrix ) );

						}

						if ( ( nx !== h && nx !== h + 1 ) || x === worldWidth - 1 ) {

							geometries.push( nxGeometry.clone().applyMatrix4( matrix ) );

						}

						if ( ( pz !== h && pz !== h + 1 ) || z === worldDepth - 1 ) {

							geometries.push( pzGeometry.clone().applyMatrix4( matrix ) );

						}

						if ( ( nz !== h && nz !== h + 1 ) || z === 0 ) {

							geometries.push( nzGeometry.clone().applyMatrix4( matrix ) );

						}

					}

				}

				const geometry = BufferGeometryUtils.mergeGeometries( geometries );
				geometry.computeBoundingSphere();

				const texture = new THREE.TextureLoader().load( 'textures/minecraft/atlas.png' );
				texture.colorSpace = THREE.SRGBColorSpace;
				texture.magFilter = THREE.NearestFilter;

				const mesh = new THREE.Mesh( geometry, new THREE.MeshLambertMaterial( { map: texture, side: THREE.DoubleSide } ) );
				scene.add( mesh );

				const ambientLight = new THREE.AmbientLight( 0xeeeeee, 3 );
				scene.add( ambientLight );

				const directionalLight = new THREE.DirectionalLight( 0xffffff, 12 );
				directionalLight.position.set( 1, 1, 0.5 ).normalize();
				scene.add( directionalLight );

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				container.appendChild( renderer.domElement );

				controls = new FirstPersonControls( camera, renderer.domElement );

				controls.movementSpeed = 1000;
				controls.lookSpeed = 0.125;
				controls.lookVertical = true;

				stats = new Stats();
				container.appendChild( stats.dom );

				//

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

				controls.handleResize();

			}

			function generateHeight( width, height ) {

				const data = [], perlin = new ImprovedNoise(),
					size = width * height, z = Math.random() * 100;

				let quality = 2;

				for ( let j = 0; j < 4; j ++ ) {

					if ( j === 0 ) for ( let i = 0; i < size; i ++ ) data[ i ] = 0;

					for ( let i = 0; i < size; i ++ ) {

						const x = i % width, y = ( i / width ) | 0;
						data[ i ] += perlin.noise( x / quality, y / quality, z ) * quality;


					}

					quality *= 4;

				}

				return data;

			}

			function getY( x, z ) {

				return ( data[ x + z * worldWidth ] * 0.15 ) | 0;

			}

			//

			function animate() {

				animationId = requestAnimationFrame( animate );
				const delta = clock.getDelta();

				render();
				stats.update();

			}

			function render() {

				controls.update( clock.getDelta() );
				renderer.render( scene, camera );

			}

		</script>

	</body>
</html>
